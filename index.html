<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGG AI // INDEV</title>
    <style>
        :root { 
            --primary: #f55036; 
            --bg: #0b0f19; 
            --card: #161b22; 
            --text: #e6edf3; 
            --code-bg: #000000;
            --neon-green: #44d62c;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
        }

        .app-container { 
            width: 95%; 
            max-width: 800px; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
        }

        /* Setup Screen */
        #setup-screen { 
            text-align: left; 
            margin-top: 5vh; 
            padding: 30px; 
            background: var(--card); 
            border-radius: 15px; 
            border: 1px solid #30363d;
        }

        .step-box {
            background: #0d1117;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            margin: 20px 0;
            font-size: 0.9em;
        }

        /* Chat Screen */
        #chat-screen { display: none; flex-direction: column; height: 95vh; }

        #chat-box { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        .msg { padding: 14px; border-radius: 10px; line-height: 1.6; max-width: 85%; word-wrap: break-word; }
        .user { background: var(--primary); align-self: flex-end; color: white; }
        .ai { background: var(--card); align-self: flex-start; border: 1px solid #30363d; }

        /* Neon Code Boxes */
        pre { 
            background: var(--code-bg); color: #f8f8f2; padding: 20px; border-radius: 8px; 
            overflow-x: auto; position: relative; border: 1px solid var(--neon-green); 
            margin: 15px 0;
        }
        code { font-family: 'Consolas', monospace; }
        .copy-btn { 
            position: absolute; right: 10px; top: 10px; background: var(--neon-green); 
            color: #000; border: none; padding: 5px 12px; border-radius: 4px; 
            cursor: pointer; font-weight: bold; font-size: 11px;
        }

        /* Input Area */
        .input-area { display: flex; gap: 10px; padding: 20px 0; background: var(--bg); }
        input { flex-grow: 1; padding: 15px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; outline: none; font-size: 1rem; }
        button.main-btn { background: var(--primary); color: white; border: none; padding: 0 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="setup-screen">
        <h1 style="color:var(--primary); margin:0; text-align:center;">PGG AI</h1>
        
        <div class="step-box">
            <h3 style="margin-top:0">API Key Setup:</h3>
            <ol style="line-height: 1.6;">
                <li>Go to <a href="https://console.groq.com/keys" target="_blank" style="color:var(--primary)">console.groq.com/keys</a></li>
                <li>Create a new API Key</li>
                <li>Copy the key (starts with <code>gsk_</code>)</li>
            </ol>
        </div>

        <input type="password" id="apiKeyInput" placeholder="Paste gsk_ key here..." style="width: 100%; box-sizing: border-box; margin-bottom: 20px;">
        <button class="main-btn" onclick="saveKey()" style="height: 55px; width: 100%;">UNLOCK SYSTEM</button>
    </div>

    <div id="chat-screen">
        <h3 style="color:var(--primary); margin: 0 0 10px 0;">PGG AI // SESSION</h3>
        <div id="chat-box">
            <div class="msg ai"><b>PGG AI:</b> System active. How can I assist?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type and hit Enter...">
            <button class="main-btn" onclick="sendMessage()">RUN</button>
        </div>
    </div>
</div>

<script>
    let API_KEY = "";

    function saveKey() {
        const val = document.getElementById('apiKeyInput').value.trim();
        if (val.startsWith('gsk_')) {
            API_KEY = val;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
        } else { alert("Invalid Key"); }
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const box = document.getElementById('chat-box');
        const text = input.value.trim();
        if (!text) return;

        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "You are PGG AI. You are a custom tool, not Meta." },
                        { role: "user", content: text }
                    ]
                })
            });

            const data = await response.json();
            let reply = data.choices[0].message.content;

            const formatted = reply.replace(/```([\s\S]*?)```/g, (match, code) => {
                const clean = code.replace(/^[a-z]+\n/i, ""); 
                return `<pre><button class="copy-btn" onclick="copyCode(this)">COPY</button><code>${escapeHtml(clean.trim())}</code></pre>`;
            });

            box.innerHTML += `<div class="msg ai"><b>PGG AI:</b><br>${formatted}</div>`;
        } catch (err) {
            box.innerHTML += `<div class="msg ai" style="color: red;">Connection Error.</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function copyCode(btn) {
        navigator.clipboard.writeText(btn.nextElementSibling.innerText);
        btn.innerText = "COPIED";
        setTimeout(() => { btn.innerText = "COPY"; }, 2000);
    }

    document.getElementById("userInput").addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
</script>

</body>
</html>
