<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGG AI // INDEV</title>
    <style>
        :root { --primary: #f55036; --bg: #0b0f19; --card: #161b22; --text: #e6edf3; --sidebar-w: 280px; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #setup-screen { position: fixed; inset: 0; z-index: 999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
        .setup-card { background: var(--card); padding: 35px; border-radius: 15px; border: 1px solid #30363d; width: 440px; text-align: center; }
        .warning-box { background: rgba(245, 80, 54, 0.1); border: 1px solid var(--primary); color: var(--text); padding: 15px; border-radius: 8px; font-size: 0.85em; margin-bottom: 20px; text-align: left; line-height: 1.4; }

        #main-wrapper { display: none; width: 100%; height: 100%; flex-direction: row; }
        .sidebar { width: var(--sidebar-w); background: #0d1117; border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 15px; }
        .chat-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .history-item { display: flex; align-items: center; justify-content: space-between; background: #161b22; padding: 12px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; font-size: 13px; }
        .active-chat { border-color: var(--primary) !important; background: #1c2128; }
        .delete-btn { color: #8b949e; font-size: 18px; padding-left: 10px; transition: 0.2s; }

        .chat-container { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; }
        #chat-box { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 20px; }
        .msg { padding: 14px; border-radius: 12px; line-height: 1.6; max-width: 80%; word-wrap: break-word; font-size: 15px; }
        .user { background: var(--primary); align-self: flex-end; color: white; border-bottom-right-radius: 2px; }
        .ai { background: var(--card); align-self: flex-start; border: 1px solid #30363d; border-bottom-left-radius: 2px; }
        
        .input-area { display: flex; gap: 10px; padding: 20px 0; border-top: 1px solid #30363d; }
        input { flex-grow: 1; padding: 14px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; outline: none; }
        .main-btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        select { background: #161b22; color: white; border: 1px solid var(--primary); padding: 8px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-card">
            <h2 style="color:var(--primary); margin:0;">PGG AI</h2>
            <p style="color: #8b949e; font-size: 0.85em; margin-bottom: 20px;">PROJECT BY ZWE WINT // PGG STUDIO</p>
            
            <div class="warning-box">
                <b style="color:var(--primary)">⚠️ CRITICAL:</b><br>
                Write your API key on <b>paper</b> or in a <b>Notepad</b> before copying it.
            </div>

            <div style="text-align: left; font-size: 0.85em; color: #e6edf3; margin-bottom: 15px; background: #1c2128; padding: 12px; border-radius: 8px; border: 1px solid #30363d;">
                <b style="color:var(--primary)">STEPS TO START:</b><br>
                1. Visit <a href="https://console.groq.com/keys" target="_blank" style="color:var(--primary); text-decoration: none;">Groq Cloud Console</a><br>
                2. Create and copy your <code>gsk_</code> API Key.<br>
                3. Paste the key below and hit <b>BOOT</b>.
            </div>
            
            <input type="password" id="apiKeyInput" placeholder="Enter your gsk_ key...">
            <button class="main-btn" onclick="bootSystem()" style="width: 100%; margin-top: 15px;">BOOT SYSTEM</button>
        </div>
    </div>

    <div id="main-wrapper">
        <div class="sidebar">
            <button class="main-btn" onclick="createNewChat()">+ NEW CHAT</button>
            <div id="chat-list" class="chat-list"></div>
        </div>
        <div class="chat-container">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom: 1px solid #30363d; padding-bottom:10px;">
                <h3 style="color:var(--primary); margin:0;">PGG AI // SESSION</h3>
                <select id="modelSelect" onchange="updateSystemPrompt()">
                    <option value="qwen/qwen3-32b">PGG // SMALL 3</option>
                    <option value="openai/gpt-oss-120b">PGG // LARGE 3</option>
                    
                    <option value="qwen/qwen3-32b">PGS // 3 (32B)</option>
                    <option value="meta-llama/llama-4-scout-17b-16e-instruct">PGS // 3.5 MAX</option>
                    <option value="qwen/qwen3-32b">PGS // THINKING</option>
                </select>
            </div>
            <div id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Ask PGG AI anything...">
                <button class="main-btn" onclick="handleSend()">RUN</button>
            </div>
        </div>
    </div>

<script>
    let API_KEY = "";
    let currentChatId = null;
    let activeHistory = [];

    function bootSystem() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if (key.startsWith('gsk_')) {
            API_KEY = key;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('main-wrapper').style.display = 'flex';
            refreshSidebar();
            createNewChat();
        } else { alert("Invalid key format."); }
    }

    function getSystemPrompt() {
        const modelName = document.getElementById('modelSelect').selectedOptions[0].text;
        return `Your name is PGG AI. Created by PGG Studio (Zwe Wint). Using ${modelName}. Be helpful.`;
    }

    async function handleSend() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        activeHistory.push({ role: "user", content: text });
        input.value = "";
        renderMessages();

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    model: document.getElementById('modelSelect').value, 
                    messages: activeHistory,
                    temperature: 0.6
                })
            });
            const data = await response.json();
            
            if (data.error) {
                alert("API Alert: " + data.error.message);
                return;
            }

            let reply = data.choices[0].message.content;
            activeHistory.push({ role: "assistant", content: reply });
            saveCurrentChat();
            renderMessages();
        } catch (e) { alert("Network error."); }
    }

    function createNewChat() {
        currentChatId = Date.now();
        activeHistory = [{ role: "system", content: getSystemPrompt() }];
        renderMessages();
        refreshSidebar();
    }

    function saveCurrentChat() {
        let storage = JSON.parse(localStorage.getItem('pgg_v15') || '{}');
        const userMsg = activeHistory.find(m => m.role === 'user');
        storage[currentChatId] = { title: userMsg ? userMsg.content.slice(0, 25) : "New Session", history: activeHistory };
        localStorage.setItem('pgg_v15', JSON.stringify(storage));
        refreshSidebar();
    }

    function loadChat(id) {
        let storage = JSON.parse(localStorage.getItem('pgg_v15') || '{}');
        currentChatId = id;
        activeHistory = storage[id].history;
        renderMessages();
        refreshSidebar();
    }

    function deleteChat(id, e) {
        e.stopPropagation();
        let storage = JSON.parse(localStorage.getItem('pgg_v15') || '{}');
        delete storage[id];
        localStorage.setItem('pgg_v15', JSON.stringify(storage));
        if (currentChatId == id) createNewChat();
        refreshSidebar();
    }

    function refreshSidebar() {
        const list = document.getElementById('chat-list');
        list.innerHTML = "";
        let storage = JSON.parse(localStorage.getItem('pgg_v15') || '{}');
        Object.keys(storage).reverse().forEach(id => {
            const item = document.createElement('div');
            item.className = `history-item ${id == currentChatId ? 'active-chat' : ''}`;
            item.innerHTML = `<span onclick="loadChat(${id})" style="flex-grow:1;">${storage[id].title}</span>
                              <span class="delete-btn" onclick="deleteChat(${id}, event)">×</span>`;
            list.appendChild(item);
        });
    }

    function renderMessages() {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        activeHistory.forEach(m => {
            if(m.role === 'system') return;
            box.innerHTML += `<div class="msg ${m.role === 'user' ? 'user' : 'ai'}">
                ${m.role === 'assistant' ? '<b style="color:var(--primary); font-size:0.8em;">PGG AI</b><br>' : ''}
                ${m.content}
            </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById("userInput").addEventListener("keypress", (e) => { if(e.key === 'Enter') handleSend(); });
</script>
</body>
</html>
